<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckxtreme Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <div class="navbar">
        <div class="logo">
            <img src="picture/Logo.png" alt="DuckXtreme Logo">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Store</a></li>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="account.html">Login/Register</a></li>
            </ul>
        </nav>
    </div>

    <h1 class="page-title">Shop Our Ducks</h1>

    <div class="products">

        <div class="product-card">
            <img src="picture/glitter.jpeg">
            <h3>Gold Glitter Duck</h3>
            <p>$3.99</p>
            <button onclick="addToCart('Gold Glitter Duck', 3.99)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="picture/duckOfducks.jpeg">
            <h3>Duck of Ducks</h3>
            <p>$7.99</p>
            <button onclick="addToCart('Duck of Ducks', 7.99)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="picture/many.jpeg">
            <h3>Character Duck Bundle</h3>
            <p>$14.99</p>
            <button onclick="addToCart('Character Duck Bundle', 14.99)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="picture/manyglit.jpeg">
            <h3>Glitter Duck Bundle</h3>
            <p>$9.99</p>
            <button onclick="addToCart('Glitter Duck Bundle', 9.99)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="picture/peach.jpeg">
            <h3>Peach Duck</h3>
            <p>$3.49</p>
            <button onclick="addToCart('Peach Duck', 3.49)">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="picture/pearl.jpeg">
            <h3>Pearl Crown Duck</h3>
            <p>$4.99</p>
            <button onclick="addToCart('Pearl Crown Duck', 4.99)">Add to Cart</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
